name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov scikit-learn pandas numpy joblib
    
    - name: Create models directory
      run: mkdir -p models
    
    - name: Train model (create model file)
      run: |
        python -c "
import sys
import os
sys.path.insert(0, os.getcwd())
from src.ai_feature.sentiment_model import SentimentModel

# Create training data
texts = ['good', 'bad', 'great', 'terrible'] * 100
labels = [1, 0, 1, 0] * 100

# Train and save model
model = SentimentModel()
model.train(texts, labels)
model.save('models/sentiment_model.joblib')
print('Model saved successfully')
"
    
    - name: Run tests
      run: |
        python -m pytest tests/test_model.py -v